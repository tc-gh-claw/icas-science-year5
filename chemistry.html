<head>

    <title>ICAS Chemistry Year 5 - 100 Questions</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 16px;
        }

        .progress-bar {
            background: rgba(255,255,255,0.2);
            height: 8px;
            border-radius: 4px;
            margin-top: 15px;
            overflow: hidden;
        }

        .progress-fill {
            background: #fff;
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
            border-radius: 4px;
        }

        .quiz-container {
            padding: 30px;
        }

        .question {
            margin-bottom: 25px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 12px;
            border-left: 4px solid #667eea;
        }

        .question-number {
            font-weight: bold;
            color: #667eea;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .question-text {
            font-size: 17px;
            color: #333;
            margin-bottom: 15px;
            line-height: 1.6;
        }

        .question-text small {
            display: block;
            color: #666;
            margin-top: 5px;
            font-size: 14px;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option {
            padding: 12px 15px;
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 15px;
        }

        .option:hover {
            border-color: #667eea;
            background: #f0f4ff;
        }

        .option.selected {
            border-color: #667eea;
            background: #667eea;
            color: white;
        }

        .option.correct {
            border-color: #28a745;
            background: #d4edda;
            color: #155724;
        }

        .option.incorrect {
            border-color: #dc3545;
            background: #f8d7da;
            color: #721c24;
        }

        .answer-explanation {
            display: none;
            margin-top: 15px;
            padding: 12px;
            background: #e8f4f8;
            border-radius: 8px;
            font-size: 14px;
            color: #333;
        }

        .answer-explanation.show {
            display: block;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            padding: 20px 30px;
            background: #f8f9fa;
            border-top: 1px solid #e0e0e0;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        .results {
            display: none;
            padding: 40px;
            text-align: center;
        }

        .results.show {
            display: block;
        }

        .score-circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            color: white;
            font-size: 48px;
            font-weight: bold;
        }

        .results h2 {
            color: #333;
            margin-bottom: 15px;
        }

        .results p {
            color: #666;
            font-size: 18px;
            margin-bottom: 30px;
        }

        .category-scores {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin: 30px 0;
            text-align: left;
        }

        .category-score {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }

        .category-score h4 {
            color: #667eea;
            margin-bottom: 5px;
            font-size: 14px;
        }

        .category-score p {
            margin: 0;
            font-size: 20px;
            font-weight: bold;
            color: #333;
        }

        .nav-links {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .nav-link {
            padding: 10px 20px;
            background: #f8f9fa;
            border-radius: 20px;
            text-decoration: none;
            color: #667eea;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .nav-link:hover {
            background: #667eea;
            color: white;
        }

        @media (max-width: 600px) {
            .container {
                border-radius: 0;
            }
            
            body {
                padding: 0;
            }
            
            .quiz-container {
                padding: 20px;
            }
            
            .controls {
                flex-direction: column;
                gap: 10px;
            }
            
            .btn {
                width: 100%;
            }
        }
    </style>
</head>

            <div class="nav-links">

    <script>
        // Question bank - 100 questions organized by category
        const questions = [
            // Category 1: States of Matter (Questions 1-20)
            {
                id: 1,
                category: "States of Matter",
                question: "Which state has definite shape and volume?<br><small>(哪種物態有固定形狀和體積？)</small>",
                options: ["Gas (氣體)", "Liquid (液體)", "Solid (固體)", "Plasma (等離子體)"],
                correct: 2,
                explanation: "固體有固定的形狀和體積。Solids have definite shape and volume."
            },
            {
                id: 2,
                category: "States of Matter",
                question: "What happens when water freezes?<br><small>(水結冰時會？)</small>",
                options: ["Liquid to solid (液體變固體)", "Solid to liquid (固體變液體)", "Liquid to gas (液體變氣體)", "It disappears (消失)"],
                correct: 0,
                explanation: "結冰是液態變固態的凝固過程。Freezing is the process of liquid turning into solid."
            },
            {
                id: 3,
                category: "States of Matter",
                question: "Process when solid turns directly into gas?<br><small>(固體直接變氣體的過程？)</small>",
                options: ["Melting (熔化)", "Boiling (沸騰)", "Sublimation (昇華)", "Condensation (凝結)"],
                correct: 2,
                explanation: "昇華是固體直接變成氣體，如乾冰。Sublimation is when solid turns directly to gas, like dry ice."
            },
            {
                id: 4,
                category: "States of Matter",
                question: "Process when water vapor turns into liquid?<br><small>(水蒸氣變液態水的過程？)</small>",
                options: ["Evaporation (蒸發)", "Freezing (凝固)", "Condensation (凝結)", "Melting (熔化)"],
                correct: 2,
                explanation: "凝結是氣體變成液體的過程。Condensation is when gas turns into liquid."
            },
            {
                id: 5,
                category: "States of Matter",
                question: "Boiling point of water at sea level?<br><small>(水在海平面的沸點？)</small>",
                options: ["0°C", "50°C", "90°C", "100°C"],
                correct: 3,
                explanation: "水在標準大氣壓下的沸點是100°C。Water boils at 100°C at sea level."
            },
            {
                id: 6,
                category: "States of Matter",
                question: "Freezing point of water?<br><small>(水的冰點？)</small>",
                options: ["100°C", "50°C", "25°C", "0°C"],
                correct: 3,
                explanation: "水在0°C時結冰。Water freezes at 0°C."
            },
            {
                id: 7,
                category: "States of Matter",
                question: "What happens when a gas is heated?<br><small>(氣體受熱時會？)</small>",
                options: ["Particles stop moving (粒子停止)", "Become smaller (變小)", "Lose energy (失去能量)", "Move faster and spread (移動更快並擴散)"],
                correct: 3,
                explanation: "加熱使粒子獲得能量，運動加快。Heating gives particles more energy to move faster."
            },
            {
                id: 8,
                category: "States of Matter",
                question: "What happens when a gas is cooled?<br><small>(氣體被冷卻時會？)</small>",
                options: ["May turn into liquid (可能變液體)", "Expands (膨脹)", "Becomes less dense (變稀疏)", "Moves faster (移動更快)"],
                correct: 0,
                explanation: "冷卻氣體可能使其凝結成液體。Cooling gas may cause it to condense into liquid."
            },
            {
                id: 9,
                category: "States of Matter",
                question: "What happens when a substance melts?<br><small>(物質熔化時會？)</small>",
                options: ["Liquid to solid", "Liquid to gas", "Solid to liquid", "It disappears"],
                correct: 2,
                explanation: "熔化是固體變成液體的過程。Melting is when solid turns into liquid."
            },
            {
                id: 10,
                category: "States of Matter",
                question: "Gas making up 78% of Earth's atmosphere?<br><small>(佔大氣78%的氣體？)</small>",
                options: ["Nitrogen (氮氣)", "Oxygen (氧氣)", "Carbon dioxide (二氧化碳)", "Hydrogen (氫氣)"],
                correct: 0,
                explanation: "氮氣約佔空氣的78%。Nitrogen makes up about 78% of the atmosphere."
            },
            {
                id: 11,
                category: "States of Matter",
                question: "Which state of matter has particles that are closest together?<br><small>(哪種物態的粒子最接近？)</small>",
                options: ["Solid (固體)", "Liquid (液體)", "Gas (氣體)", "Plasma (等離子體)"],
                correct: 0,
                explanation: "固體的粒子緊密排列。Particles in solids are packed closely together."
            },
            {
                id: 12,
                category: "States of Matter",
                question: "Which state of matter takes the shape of its container?<br><small>(哪種物態會隨容器改變形狀？)</small>",

                correct: 2,
                explanation: "液體和氣體都會隨容器改變形狀。Liquids and gases take the shape of their container."
            },
            {
                id: 13,
                category: "States of Matter",
                question: "What is evaporation?<br><small>(什麼是蒸發？)</small>",
                options: ["Gas to liquid", "Liquid to gas", "Solid to liquid", "Solid to gas"],
                correct: 1,
                explanation: "蒸發是液體變成氣體的過程。Evaporation is when liquid turns into gas."
            },
            {
                id: 14,
                category: "States of Matter",
                question: "Which metal is liquid at room temperature?<br><small>(室溫下是液體的金屬？)</small>",
                options: ["Gold (金)", "Silver (銀)", "Mercury (汞)", "Copper (銅)"],
                correct: 2,
                explanation: "水銀是唯一在室溫下呈液態的金屬。Mercury is the only metal that is liquid at room temperature."
            },
            {
                id: 15,
                category: "States of Matter",
                question: "What is the process called when a liquid slowly turns to gas at room temperature?<br><small>(液體在室溫下緩慢變成氣體的過程叫？)</small>",
                options: ["Boiling (沸騰)", "Evaporation (蒸發)", "Condensation (凝結)", "Freezing (凝固)"],
                correct: 1,
                explanation: "蒸發可以在任何溫度發生，沸騰只在沸點發生。Evaporation happens at any temperature, boiling only at boiling point."

            {
                id: 16,
                category: "States of Matter",
                question: "In which state do particles move the fastest?<br><small>(哪種物態的粒子移動最快？)</small>",

                correct: 2,
                explanation: "氣體粒子移動最快，因為它們有最多能量。Gas particles move fastest as they have the most energy."

            {
                id: 17,
                category: "States of Matter",
                question: "What happens to the volume of water when it freezes?<br><small>(水結冰時體積會？)</small>",

                correct: 2,
                explanation: "水結冰時體積會膨脹。Water expands when it freezes into ice."
            },
            {
                id: 18,
                category: "States of Matter",
                question: "Which state can be compressed easily?<br><small>(哪種物態容易被壓縮？)</small>",
                options: ["Solid", "Liquid", "Gas", "None"],
                correct: 2,
                explanation: "氣體粒子之間有很多空間，可以被壓縮。Gas can be compressed as particles are far apart."
            },
            {
                id: 19,
                category: "States of Matter",
                question: "What is the temperature at which a liquid boils called?<br><small>(液體沸騰的溫度稱為？)</small>",
                options: ["Freezing point", "Melting point", "Boiling point", "Condensation point"],
                correct: 2,
                explanation: "沸點是液體變成氣體的溫度。Boiling point is when liquid turns to gas."
            },
            {
                id: 20,
                category: "States of Matter",
                question: "Which of these is NOT a state of matter?<br><small>(哪個不是物態？)</small>",
                options: ["Solid", "Liquid", "Gas", "Mixture"],
                correct: 3,
                explanation: "混合物不是物態，而是一種組合。Mixture is not a state of matter."
            },

            // Category 2: Mixtures & Solutions (Questions 21-40)
            {
                id: 21,
                category: "Mixtures & Solutions",
                question: "Mixture where one substance dissolves in another?<br><small>(一種物質溶解在另一種中的混合物？)</small>",
                options: ["Solution (溶液)", "Suspension (懸浮液)", "Compound (化合物)", "Element (元素)"],
                correct: 0,
                explanation: "溶液是溶質完全溶解在溶劑中的均勻混合物。A solution is a homogeneous mixture where solute dissolves in solvent."
            },
            {
                id: 22,
                category: "Mixtures & Solutions",
                question: "Mixture where particles are scattered but not dissolved?<br><small>(粒子分散但未溶解的混合物？)</small>",
                options: ["Solution (溶液)", "Compound (化合物)", "Element (元素)", "Suspension (懸浮液)"],
                correct: 3,
                explanation: "懸浮液中固體粒子分散在液體中但會沉澱。In a suspension, solid particles are scattered but will settle."
            },
            {
                id: 23,
                category: "Mixtures & Solutions",
                question: "pH value of pure water?<br><small>(純水的pH值？)</small>",
                options: ["7", "1", "14", "0"],
                correct: 0,
                explanation: "純水是中性，pH值為7。Pure water is neutral with a pH of 7."
            },
            {
                id: 24,
                category: "Mixtures & Solutions",
                question: "What do we call the substance that dissolves in a solvent?<br><small>(在溶劑中溶解的物質稱為？)</small>",

                correct: 1,
                explanation: "溶質是溶解在溶劑中的物質。Solute is the substance that dissolves in the solvent."

            {
                id: 25,
                category: "Mixtures & Solutions",
                question: "Which of these is a solution?<br><small>(哪個是溶液？)</small>",

                correct: 1,
                explanation: "鹽溶解在水中形成溶液。Salt dissolves in water to form a solution."
            },
            {
                id: 26,
                category: "Mixtures & Solutions",
                question: "What happens when you add more solute than can dissolve?<br><small>(加入過多溶質時會？)</small>",
                options: ["It all dissolves", "It forms a saturated solution", "It disappears", "It becomes a gas"],
                correct: 1,
                explanation: "飽和溶液不能再溶解更多溶質。A saturated solution cannot dissolve any more solute."
            },
            {
                id: 27,
                category: "Mixtures & Solutions",
                question: "Which pH value indicates an acid?<br><small>(哪個pH值表示酸性？)</small>",
                options: ["7", "8", "5", "14"],
                correct: 2,
                explanation: "pH值小於7表示酸性。pH less than 7 indicates acidity."
            },
            {
                id: 28,
                category: "Mixtures & Solutions",
                question: "Which pH value indicates a base/alkali?<br><small>(哪個pH值表示鹼性？)</small>",
                options: ["7", "10", "4", "1"],
                correct: 1,
                explanation: "pH值大於7表示鹼性。pH greater than 7 indicates alkalinity."
            },
            {
                id: 29,
                category: "Mixtures & Solutions",
                question: "What is the main solvent in seawater?<br><small>(海水中的主要溶劑是？)</small>",
                options: ["Salt", "Water", "Sand", "Oil"],
                correct: 1,
                explanation: "水是溶劑，溶解了鹽等溶質。Water is the solvent that dissolves salt."
            },
            {
                id: 30,
                category: "Mixtures & Solutions",
                question: "What type of mixture is air?<br><small>(空氣是什麼類型的混合物？)</small>",
                options: ["Solution (溶液)", "Suspension (懸浮液)", "Compound (化合物)", "Element (元素)"],
                correct: 0,
                explanation: "空氣是氣體溶液。Air is a gaseous solution."
            },
            {
                id: 31,
                category: "Mixtures & Solutions",
                question: "What happens to solubility of most solids when temperature increases?<br><small>(溫度升高時大多數固體的溶解度會？)</small>",

                correct: 1,
                explanation: "大多數固體在溫度升高時溶解度增加。Most solids become more soluble at higher temperatures."

            {
                id: 32,
                category: "Mixtures & Solutions",

            },
            {
                id: 97,
                category: "Separation Methods",
                question: "Which separation method uses heat?<br><small>(哪種分離方法使用熱？)</small>",
                options: ["Filtration only", "Evaporation and distillation", "Magnetism only", "Sieving only"],
                correct: 1,
                explanation: "蒸發和蒸餾都需要加熱。Evaporation and distillation both require heat."
            },
            {
                id: 98,
                category: "Separation Methods",
                question: "What is the purpose of filter paper in filtration?<br><small>(濾紙在過濾中的作用是？)</small>",
                options: ["To dissolve solids", "To trap solid particles", "To heat the liquid", "To cool the mixture"],
                correct: 1,
                explanation: "濾紙的細孔捕捉固體粒子。Filter paper traps solid particles with its tiny holes."
            },
            {
                id: 99,
                category: "Separation Methods",
                question: "Which method would you use to separate pebbles from water?<br><small>(如何分離鵝卵石和水？)</small>",
                options: ["Evaporation", "Filtration or decantation", "Distillation", "Chromatography"],
                correct: 1,
                explanation: "過濾或傾析都可以分離大顆粒固體。Filtration or decantation separates large particles."
            },
            {
                id: 100,
                category: "Separation Methods",
                question: "What is the final step in obtaining salt from seawater?<br><small>(從海水中獲取鹽的最後一步是？)</small>",
                options: ["Filtration", "Evaporation of water", "Adding more water", "Cooling"],
                correct: 1,
                explanation: "蒸發掉水分後留下鹽。Evaporating water leaves salt behind."
            }
        ];

        // User answers storage
        let userAnswers = {};

        // Initialize quiz
        function initQuiz() {
            const container = document.getElementById('quizContainer');
            container.innerHTML = '';
            
            questions.forEach((q, index) => {
                const questionDiv = document.createElement('div');
                questionDiv.className = 'question';
                questionDiv.innerHTML = `
                    <div class="question-number">Question ${index + 1} of 100 | ${q.category}</div>
                    <div class="question-text">${q.question}</div>
                    <div class="options">
                        ${q.options.map((opt, optIndex) => `
                            <div class="option" onclick="selectOption(${index}, ${optIndex})" data-q="${index}" data-opt="${optIndex}">
                                ${String.fromCharCode(65 + optIndex)}. ${opt}
                            </div>
                        `).join('')}
                    </div>
                    <div class="answer-explanation" id="explanation-${index}">
                        <strong>答案 Answer:</strong> ${String.fromCharCode(65 + q.correct)}<br>
                        ${q.explanation}
                    </div>
                `;
                container.appendChild(questionDiv);
            });
            
            updateProgress();
        }

        // Select option
        function selectOption(questionIndex, optionIndex) {
            userAnswers[questionIndex] = optionIndex;
            
            // Update UI
            const options = document.querySelectorAll(`[data-q="${questionIndex}"]`);
            options.forEach(opt => opt.classList.remove('selected'));
            options[optionIndex].classList.add('selected');
            
            updateProgress();
        }

        // Update progress bar
        function updateProgress() {
            const answered = Object.keys(userAnswers).length;
            const progress = (answered / questions.length) * 100;
            document.getElementById('progressBar').style.width = progress + '%';
        }

        // Submit quiz
        function submitQuiz() {
            const answered = Object.keys(userAnswers).length;
            if (answered < questions.length) {
                const confirmSubmit = confirm(`You have answered ${answered} out of 100 questions. Are you sure you want to submit?\n\n您已回答了 ${answered}/100 題。確定要提交嗎？`);
                if (!confirmSubmit) return;
            }
            
            // Calculate scores
            let totalCorrect = 0;
            let categoryScores = {
                "States of Matter": { correct: 0, total: 0 },
                "Mixtures & Solutions": { correct: 0, total: 0 },
                "Materials & Properties": { correct: 0, total: 0 },
                "Physical & Chemical Changes": { correct: 0, total: 0 },
                "Separation Methods": { correct: 0, total: 0 }
            };
            
            questions.forEach((q, index) => {
                const category = q.category;
                categoryScores[category].total++;
                
                if (userAnswers[index] === q.correct) {
                    totalCorrect++;
                    categoryScores[category].correct++;
                }
                
                // Show correct/incorrect
                const options = document.querySelectorAll(`[data-q="${index}"]`);
                options.forEach((opt, optIndex) => {
                    opt.classList.remove('selected');
                    if (optIndex === q.correct) {
                        opt.classList.add('correct');
                    } else if (optIndex === userAnswers[index] && optIndex !== q.correct) {
                        opt.classList.add('incorrect');
                    }
                    opt.onclick = null;
                    opt.style.cursor = 'default';
                });
                
                // Show explanation
                document.getElementById(`explanation-${index}`).classList.add('show');
            });
            
            // Show results
            const percentage = Math.round((totalCorrect / questions.length) * 100);
            document.getElementById('scoreCircle').textContent = percentage + '%';
            document.getElementById('scoreText').textContent = `You answered ${totalCorrect}/100 questions correctly | 你答對了 ${totalCorrect}/100 題`;
            
            // Update category scores
            document.getElementById('cat1Score').textContent = `${categoryScores["States of Matter"].correct}/20`;
            document.getElementById('cat2Score').textContent = `${categoryScores["Mixtures & Solutions"].correct}/20`;
            document.getElementById('cat3Score').textContent = `${categoryScores["Materials & Properties"].correct}/20`;
            document.getElementById('cat4Score').textContent = `${categoryScores["Physical & Chemical Changes"].correct}/20`;
            document.getElementById('cat5Score').textContent = `${categoryScores["Separation Methods"].correct}/20`;
            
            document.getElementById('quizContainer').style.display = 'none';
            document.getElementById('controls').style.display = 'none';
            document.getElementById('results').classList.add('show');
            
            // Scroll to top
            window.scrollTo(0, 0);
        }

        // Reset quiz
        function resetQuiz() {
            userAnswers = {};
            document.getElementById('quizContainer').style.display = 'block';
            document.getElementById('controls').style.display = 'flex';
            document.getElementById('results').classList.remove('show');
            initQuiz();
            window.scrollTo(0, 0);
        }

        // Initialize on load
        window.onload = initQuiz;
    </script>
</body>
</html>
