        .quiz-container {

        .question-text {

            margin-bottom: 15px;
            line-height: 1.6;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option {
            padding: 12px 15px;
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 15px;
        }

        .option:hover {
            border-color: #667eea;
            background: #f0f4ff;
        }

        .option.selected {
            border-color: #667eea;
            background: #667eea;
            color: white;
        }

        .option.correct {
            border-color: #28a745;
            background: #d4edda;
            color: #155724;
        }

        .option.incorrect {
            border-color: #dc3545;
            background: #f8d7da;
            color: #721c24;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            padding: 20px 30px;
            background: #f8f9fa;
            border-top: 1px solid #e0e0e0;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);

        .btn-secondary {
            background: #6c757d;
            color: white;

        .btn-secondary:hover {
            background: #5a6268;
        }

        .results {
            display: none;
            padding: 40px;
            text-align: center;
        }

            display: block;
        }

            width: 150px;

            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;

            margin: 30px 0;
            text-align: left;

        // User answers storage
        let userAnswers = {};

        // Initialize quiz
        function initQuiz() {
            const container = document.getElementById('quizContainer');
            container.innerHTML = '';
            
            questions.forEach((q, index) => {
                const questionDiv = document.createElement('div');
                questionDiv.className = 'question';
                questionDiv.innerHTML = `
                    <div class="question-number">Question ${index + 1} of 100 | ${q.category}</div>
                    <div class="question-text">${q.question}</div>
                    <div class="options">
                        ${q.options.map((opt, optIndex) => `
                            <div class="option" onclick="selectOption(${index}, ${optIndex})" data-q="${index}" data-opt="${optIndex}">
                                ${String.fromCharCode(65 + optIndex)}. ${opt}
                            </div>
                        `).join('')}
                    </div>
                `;
                container.appendChild(questionDiv);
            });
            
            updateProgress();
        }

        // Select option
        function selectOption(questionIndex, optionIndex) {
            userAnswers[questionIndex] = optionIndex;
            
            // Update UI
            const options = document.querySelectorAll(`[data-q="${questionIndex}"]`);
            options.forEach(opt => opt.classList.remove('selected'));
            options[optionIndex].classList.add('selected');
            
            updateProgress();
        }

        // Update progress bar
        function updateProgress() {
            const answered = Object.keys(userAnswers).length;
            const progress = (answered / questions.length) * 100;
            document.getElementById('progressBar').style.width = progress + '%';
        }

        // Submit quiz
        function submitQuiz() {
            const answered = Object.keys(userAnswers).length;
            if (answered < questions.length) {
                const confirmSubmit = confirm(`You have answered ${answered} out of 100 questions. Are you sure you want to submit?`);
                if (!confirmSubmit) return;
            }
            
            // Calculate scores
            let totalCorrect = 0;
            let categoryScores = {
                "Number & Arithmetic": { correct: 0, total: 0 },
                "Algebra & Patterns": { correct: 0, total: 0 },
                "Measures & Units": { correct: 0, total: 0 },
                "Space & Geometry": { correct: 0, total: 0 },
                "Chance & Data": { correct: 0, total: 0 }
            };
            
            questions.forEach((q, index) => {
                const category = q.category;
                categoryScores[category].total++;
                
                if (userAnswers[index] === q.correct) {
                    totalCorrect++;
                    categoryScores[category].correct++;
                }
                
                // Show correct/incorrect
                const options = document.querySelectorAll(`[data-q="${index}"]`);
                options.forEach((opt, optIndex) => {
                    opt.classList.remove('selected');
                    if (optIndex === q.correct) {
                        opt.classList.add('correct');
                    } else if (optIndex === userAnswers[index] && optIndex !== q.correct) {
                        opt.classList.add('incorrect');
                    }
                    opt.onclick = null;
                    opt.style.cursor = 'default';
                });
            });
            
            // Show results
            const percentage = Math.round((totalCorrect / questions.length) * 100);
            document.getElementById('scoreCircle').textContent = percentage + '%';
            document.getElementById('scoreText').textContent = `You answered ${totalCorrect}/100 questions correctly`;
            
            // Update category scores
            document.getElementById('cat1Score').textContent = `${categoryScores["Number & Arithmetic"].correct}/20`;
            document.getElementById('cat2Score').textContent = `${categoryScores["Algebra & Patterns"].correct}/20`;
            document.getElementById('cat3Score').textContent = `${categoryScores["Measures & Units"].correct}/20`;
            document.getElementById('cat4Score').textContent = `${categoryScores["Space & Geometry"].correct}/20`;
            document.getElementById('cat5Score').textContent = `${categoryScores["Chance & Data"].correct}/20`;
            
            document.getElementById('quizContainer').style.display = 'none';
            document.getElementById('controls').style.display = 'none';
            document.getElementById('results').classList.add('show');
            
            // Scroll to top
            window.scrollTo(0, 0);
        }

        // Reset quiz
        function resetQuiz() {
            userAnswers = {};
            document.getElementById('quizContainer').style.display = 'block';
            document.getElementById('controls').style.display = 'flex';
            document.getElementById('results').classList.remove('show');
            initQuiz();
            window.scrollTo(0, 0);
        }

        // Initialize on load
        window.onload = initQuiz;
    </script>
